<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>摩耶重炮 语音站 · マヤノトップガン</title>
<meta name="description" content="摩耶重炮(マヤノトップガン)角色语音收藏,自由选择播放。" />
<style>
  :root{
    --sky-top:#7ec8f5; --sky-mid:#a9dbf7; --sky-low:#e9f6ff;
    --ink:#233b53; --ink-soft:#5b7793;
    --card:rgba(255,255,255,.72); --card-brd:rgba(255,255,255,.9);
    --pink:#ff85b3; --gold:#ffcf5c;
    --shadow:0 8px 24px rgba(48,96,140,.16);
    --bar-h:96px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,-apple-system,sans-serif;
    color:var(--ink); overflow-x:hidden;
    background:#a9dbf7;
    min-height:100%;
    padding-bottom:calc(var(--bar-h) + 20px);
  }

  /* ===== 动态天空背景 ===== */
  .sky{position:fixed;inset:0;z-index:-3;overflow:hidden;pointer-events:none;
    background:linear-gradient(180deg,#7ec2f5 0%,#a9dbf7 32%,#d7ecfb 56%,#ffe4ef 82%,#fff5ec 100%)}
  /* 缓慢流动的色彩光晕 */
  .sky::before{content:"";position:absolute;inset:-20%;
    background:
      radial-gradient(40% 40% at 78% 12%, rgba(255,247,214,.9), rgba(255,247,214,0) 60%),
      radial-gradient(50% 40% at 14% 20%, rgba(180,225,255,.7), rgba(180,225,255,0) 60%),
      radial-gradient(60% 50% at 50% 102%, rgba(255,200,224,.6), rgba(255,200,224,0) 60%);
    animation:hue 24s ease-in-out infinite alternate}
  @keyframes hue{0%{transform:translate3d(0,0,0) scale(1)}100%{transform:translate3d(0,-3%,0) scale(1.06)}}

  /* 太阳 + 光晕 */
  .sun{position:absolute;top:7%;right:12%;width:150px;height:150px;border-radius:50%;
    background:radial-gradient(circle,#fffbe9 0%,#fff2c4 34%,rgba(255,236,170,.5) 55%,rgba(255,236,170,0) 72%);
    box-shadow:0 0 80px 30px rgba(255,240,190,.5);filter:blur(1px);animation:sunPulse 7s ease-in-out infinite}
  @keyframes sunPulse{0%,100%{transform:scale(1);opacity:.92}50%{transform:scale(1.07);opacity:1}}

  /* 云 */
  .cloud{position:absolute;border-radius:100px;background:rgba(255,255,255,.9);filter:blur(7px)}
  .cloud::before,.cloud::after{content:"";position:absolute;background:inherit;border-radius:50%}
  .cloud::before{width:55%;height:150%;top:-55%;left:14%}
  .cloud::after{width:40%;height:135%;top:-42%;right:15%}
  .c1{width:220px;height:60px;top:14%;left:-260px;opacity:.9;animation:drift 48s linear infinite}
  .c2{width:340px;height:84px;top:34%;left:-400px;opacity:.62;animation:drift 72s linear infinite;animation-delay:-16s}
  .c3{width:150px;height:44px;top:60%;left:-200px;opacity:.85;animation:drift 40s linear infinite;animation-delay:-6s}
  .c4{width:300px;height:74px;top:70%;left:-340px;opacity:.5;animation:drift 62s linear infinite;animation-delay:-32s}
  .c5{width:200px;height:56px;top:24%;left:-240px;opacity:.72;animation:drift 54s linear infinite;animation-delay:-42s}
  .c6{width:120px;height:36px;top:48%;left:-160px;opacity:.8;animation:drift 34s linear infinite;animation-delay:-22s}
  @keyframes drift{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 440px))}}

  /* 随机出现/移动/消失的角色动图 */
  .sprite{position:absolute;opacity:0;pointer-events:none;will-change:transform,opacity;
    z-index:25;filter:drop-shadow(0 5px 10px rgba(60,110,150,.35))}
  .sprite img{width:100%;height:100%;object-fit:contain;display:block;animation:floaty 4.5s ease-in-out infinite}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

  /* 闪耀星光(JS 生成,彩色)*/
  .sparkle{position:absolute;animation:tw 3s ease-in-out infinite;user-select:none;text-shadow:0 0 6px currentColor}
  @keyframes tw{0%,100%{opacity:.12;transform:scale(.6)}50%{opacity:1;transform:scale(1.2)}}

  /* 飘落樱花瓣(JS 生成)*/
  .petal{position:absolute;top:-8%;border-radius:100% 0 100% 0;
    background:linear-gradient(135deg,#ffd7e8,#ff9dc3);box-shadow:0 1px 2px rgba(255,120,170,.25)}
  @keyframes fall{
    0%{transform:translate(0,-12vh) rotate(0deg);opacity:0}
    12%{opacity:.85}
    100%{transform:translate(16vw,112vh) rotate(560deg);opacity:.6}}

  /* 顶部柔光 + 底部暗角,增加层次 */
  .vignette{position:fixed;inset:0;z-index:-2;pointer-events:none;
    background:
      radial-gradient(120% 80% at 50% 6%, rgba(255,255,255,.34), rgba(255,255,255,0) 42%),
      radial-gradient(130% 100% at 50% 122%, rgba(70,120,160,.22), rgba(70,120,160,0) 55%)}

  @media (prefers-reduced-motion:reduce){
    .sky::before,.cloud,.sprite,.sparkle,.sun,.petal{animation:none}
  }

  /* ===== 头部 ===== */
  header{max-width:1120px;margin:0 auto;padding:38px 20px 6px;text-align:center}
  .title{font-size:clamp(30px,5.5vw,52px);font-weight:800;letter-spacing:1px;margin:0;
    color:#fff;text-shadow:0 3px 0 rgba(255,133,179,.55),0 6px 18px rgba(40,90,140,.35)}
  .subtitle{margin:8px 0 0;color:#f4fbff;font-size:15px;letter-spacing:2px;opacity:.95;
    text-shadow:0 2px 8px rgba(40,90,140,.35)}
  .count{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:5px 14px;border-radius:999px;
    background:rgba(255,255,255,.85);color:var(--ink);font-size:13px;font-weight:700;box-shadow:var(--shadow)}

  /* ===== 控制区 ===== */
  .controls{max-width:1120px;margin:18px auto 0;padding:0 20px;position:sticky;top:0;z-index:20}
  .controls-inner{background:rgba(255,255,255,.66);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid var(--card-brd);border-radius:18px;box-shadow:var(--shadow);padding:14px 16px}
  .searchrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:#fff;border-radius:12px;
    padding:9px 14px;box-shadow:inset 0 0 0 1px rgba(120,170,210,.3)}
  .search input{border:0;outline:0;flex:1;font-size:15px;color:var(--ink);background:transparent}
  .search input::placeholder{color:#9fb6cc}
  .btn{border:0;cursor:pointer;border-radius:12px;padding:9px 14px;font-size:14px;font-weight:700;
    background:#fff;color:var(--ink);box-shadow:inset 0 0 0 1px rgba(120,170,210,.3);transition:.15s}
  .btn:hover{transform:translateY(-1px);box-shadow:inset 0 0 0 1px var(--pink),0 4px 10px rgba(255,133,179,.25)}
  .btn.on{background:linear-gradient(135deg,var(--pink),#ff9ec3);color:#fff;box-shadow:0 4px 12px rgba(255,133,179,.4)}

  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .chip{cursor:pointer;border:0;border-radius:999px;padding:6px 13px;font-size:13px;font-weight:700;
    background:#fff;color:var(--ink);box-shadow:inset 0 0 0 1px rgba(120,170,210,.25);transition:.15s;
    display:inline-flex;align-items:center;gap:6px}
  .chip .dot{width:9px;height:9px;border-radius:50%}
  .chip .n{font-size:11px;opacity:.6;font-weight:600}
  .chip:hover{transform:translateY(-1px)}
  .chip.on{color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.12)}

  /* ===== 卡片网格 ===== */
  main{max-width:1120px;margin:18px auto 0;padding:0 20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .card{position:relative;text-align:left;cursor:pointer;border:1px solid var(--card-brd);
    background:var(--card);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border-radius:16px;padding:16px 16px 16px 20px;box-shadow:var(--shadow);transition:.16s;overflow:hidden;
    scroll-margin:110px 0 160px}
  @keyframes locate{0%{box-shadow:0 0 0 2px var(--pink),0 0 0 8px rgba(255,133,179,.35)}
    100%{box-shadow:0 0 0 2px var(--pink),0 14px 30px rgba(255,133,179,.3)}}
  .card.playing.locate{animation:locate .7s ease-out}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--cc,#7dd3fc)}
  .card:hover{transform:translateY(-3px);box-shadow:0 14px 30px rgba(48,96,140,.22)}
  .card.playing{box-shadow:0 0 0 2px var(--pink),0 14px 30px rgba(255,133,179,.3)}
  .card .cn{font-size:15.5px;font-weight:700;line-height:1.5;color:var(--ink);margin:0 0 8px}
  .card .jp{font-size:12.5px;line-height:1.45;color:var(--ink-soft);margin:0}
  .card .meta{display:flex;align-items:center;gap:8px;margin-top:12px}
  .tag{font-size:11px;font-weight:700;color:#fff;padding:2px 9px;border-radius:999px}
  .card .play{margin-left:auto;width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
    background:#fff;box-shadow:var(--shadow);color:var(--pink);font-size:14px}
  .card.playing .play{background:linear-gradient(135deg,var(--pink),#ff9ec3);color:#fff}
  .empty{text-align:center;color:#5b7793;padding:60px 0;font-size:15px}

  /* ===== 视图切换 Tabs ===== */
  .tabs{display:inline-flex;gap:6px;margin-top:16px;padding:5px;border-radius:999px;
    background:rgba(255,255,255,.6);box-shadow:var(--shadow)}
  .tab{border:0;cursor:pointer;border-radius:999px;padding:7px 20px;font-size:14px;font-weight:800;
    background:transparent;color:var(--ink);transition:.15s}
  .tab:hover{color:var(--pink)}
  .tab.on{background:linear-gradient(135deg,var(--pink),#ff9ec3);color:#fff;box-shadow:0 4px 12px rgba(255,133,179,.4)}

  /* ===== 动图画廊 ===== */
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;
    max-width:1120px;margin:18px auto 0;padding:0 20px}
  .gcard{border-radius:16px;overflow:visible;cursor:zoom-in;line-height:0;transition:.18s;
    content-visibility:auto;contain-intrinsic-size:220px 220px}
  .gcard:hover{transform:translateY(-4px) scale(1.03)}
  .gcard img{width:100%;aspect-ratio:1/1;object-fit:contain;display:block;
    filter:drop-shadow(0 5px 10px rgba(80,60,110,.3))}

  /* ===== 灯箱(点击放大)===== */
  .lightbox{position:fixed;inset:0;z-index:60;display:none;place-items:center;
    background:rgba(20,40,60,.8);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
  .lightbox.on{display:grid}
  .lightbox img{max-width:92vw;max-height:82vh;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .lb-btn{position:absolute;border:0;cursor:pointer;background:rgba(255,255,255,.92);color:var(--ink);
    width:48px;height:48px;border-radius:50%;font-size:22px;display:grid;place-items:center;box-shadow:var(--shadow);transition:.15s}
  .lb-btn:hover{background:#fff;color:var(--pink)}
  .lb-close{top:20px;right:20px}
  .lb-prev{left:16px;top:50%;transform:translateY(-50%)}
  .lb-next{right:16px;top:50%;transform:translateY(-50%)}
  .lb-count{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);color:#fff;
    font-size:13px;font-weight:700;background:rgba(0,0,0,.4);padding:5px 14px;border-radius:999px}
  @media (max-width:520px){ .lb-btn{width:40px;height:40px;font-size:18px} .gallery{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))} }

  /* ===== 分页 ===== */
  .pager{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;max-width:1120px;margin:22px auto 0;padding:0 20px}
  .pgbtn{min-width:38px;height:38px;border:0;cursor:pointer;border-radius:11px;padding:0 12px;font-size:14px;font-weight:800;
    background:rgba(255,255,255,.82);color:var(--ink);box-shadow:var(--shadow);transition:.15s}
  .pgbtn:hover:not(:disabled){transform:translateY(-1px);color:var(--pink)}
  .pgbtn.on{background:linear-gradient(135deg,var(--pink),#ff9ec3);color:#fff}
  .pgbtn:disabled{opacity:.4;cursor:default}
  .pgbtn.dots{background:transparent;box-shadow:none;cursor:default}

  /* ===== 悬浮播放器(可拖动 / 可收起) ===== */
  .player{position:fixed;z-index:30;left:50%;bottom:22px;transform:translateX(-50%);
    width:min(1040px,calc(100vw - 32px));
    background:rgba(255,255,255,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--card-brd);border-radius:20px;
    box-shadow:0 12px 34px rgba(48,96,140,.24);transition:box-shadow .2s,width .18s}
  .player.free{transform:none}                 /* 拖动后改用 left/top 定位 */
  .player.dragging{transition:none;box-shadow:0 18px 46px rgba(48,96,140,.38)}
  .player-inner{padding:12px 14px;display:flex;align-items:center;gap:12px}

  .grip{flex:0 0 auto;width:28px;height:40px;border:0;border-radius:10px;cursor:grab;
    background:rgba(120,170,210,.15);color:#7c9bb8;display:grid;place-items:center;
    font-size:18px;letter-spacing:1px;line-height:1;touch-action:none;user-select:none}
  .grip:hover{background:rgba(255,133,179,.18);color:var(--pink)}
  .grip:active{cursor:grabbing}

  .np{min-width:0;flex:1}
  .np .ncn{font-size:14.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .np .njp{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .np .njp.empty-hint{color:#9fb6cc}
  .pbtns{display:flex;align-items:center;gap:8px}
  .ctrl{width:40px;height:40px;border-radius:50%;border:0;cursor:pointer;background:#fff;color:var(--ink);
    box-shadow:var(--shadow);display:grid;place-items:center;font-size:16px;transition:.15s}
  .ctrl:hover{transform:translateY(-1px);color:var(--pink)}
  .ctrl.big{width:52px;height:52px;font-size:20px;background:linear-gradient(135deg,var(--pink),#ff9ec3);color:#fff}
  .ctrl.small{width:34px;height:34px;font-size:13px}
  .ctrl.toggle.on{color:var(--pink);box-shadow:inset 0 0 0 2px var(--pink)}
  .seekwrap{flex:2;min-width:120px;display:flex;align-items:center;gap:10px}
  .time{font-size:11px;color:var(--ink-soft);font-variant-numeric:tabular-nums;min-width:34px;text-align:center}
  .seek{flex:1;height:6px;border-radius:6px;background:rgba(120,170,210,.28);position:relative;cursor:pointer}
  .seek .fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;
    background:linear-gradient(90deg,var(--gold),var(--pink));width:0%}
  .seek .knob{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,.25);transform:translate(-50%,-50%);left:0%}

  /* 收起态:仅保留 拖动 / 收展 / 上一条 / 播放 / 下一条 */
  .player.collapsed{width:auto}
  .player.collapsed .np,
  .player.collapsed .seekwrap,
  .player.collapsed #shuffle,
  .player.collapsed #autonext{display:none}

  @media (max-width:720px){
    .player{width:calc(100vw - 20px);bottom:12px}
    .player-inner{flex-wrap:wrap;gap:8px 10px}
    .grip{order:1}#collapse{order:2}
    .np{order:3;flex-basis:calc(100% - 84px)}
    .pbtns{order:4}.seekwrap{order:5;flex-basis:100%}
    .player.collapsed .np{display:none}
  }
</style>
</head>
<body>
  <!-- 动态天空 -->
  <div class="sky" aria-hidden="true">
    <div class="sun"></div>
    <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
    <div class="cloud c4"></div><div class="cloud c5"></div><div class="cloud c6"></div>
    <div id="sparkles"></div>
    <div id="petals"></div>
    <div id="sprites"></div>
  </div>
  <div class="vignette" aria-hidden="true"></div>

  <header>
    <h1 class="title">摩耶重炮 语音站</h1>
    <p class="subtitle">マヤノトップガン ボイスコレクション</p>
    <div><span class="count" id="count">✈ 共 0 条语音</span></div>
    <div class="tabs" id="tabs">
      <button class="tab on" data-view="voice">🎧 语音</button>
      <button class="tab" data-view="gallery">🖼 动图</button>
    </div>
  </header>

  <div class="controls">
    <div class="controls-inner">
      <div class="searchrow">
        <label class="search">
          <span>🔍</span>
          <input id="search" type="search" placeholder="搜索中文或日文台词…" autocomplete="off" />
        </label>
        <button class="btn" id="shuffleAll">🎲 随机播放</button>
      </div>
      <div class="chips" id="chips"></div>
    </div>
  </div>

  <main id="voiceView">
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">没有匹配的语音,换个关键词试试~</div>
  </main>

  <div class="gallery" id="galleryView" style="display:none"></div>
  <div class="pager" id="pager" style="display:none"></div>

  <div class="lightbox" id="lightbox">
    <button class="lb-btn lb-close" id="lbClose" aria-label="关闭">✕</button>
    <button class="lb-btn lb-prev" id="lbPrev" aria-label="上一张">‹</button>
    <img id="lbImg" alt="动图" />
    <button class="lb-btn lb-next" id="lbNext" aria-label="下一张">›</button>
    <div class="lb-count" id="lbCount"></div>
  </div>

  <!-- 播放器(可拖动 / 可收起) -->
  <div class="player" id="player">
    <div class="player-inner">
      <button class="grip" id="grip" title="按住拖动播放器" aria-label="拖动播放器">⠿</button>
      <button class="ctrl small" id="collapse" title="收起 / 展开" aria-label="收起或展开">▾</button>
      <div class="np">
        <div class="ncn" id="npCn">点一条语音开始播放 ✧</div>
        <div class="njp empty-hint" id="npJp">摩耶,随时准备起飞!</div>
      </div>
      <div class="pbtns">
        <button class="ctrl" id="prev" title="上一条 (←)" aria-label="上一条">⏮</button>
        <button class="ctrl big" id="playpause" title="播放/暂停 (空格)" aria-label="播放或暂停">▶</button>
        <button class="ctrl" id="next" title="下一条 (→)" aria-label="下一条">⏭</button>
        <button class="ctrl toggle" id="shuffle" title="随机" aria-label="随机">🔀</button>
        <button class="ctrl toggle on" id="autonext" title="自动播放下一条" aria-label="自动播放下一条">↻</button>
      </div>
      <div class="seekwrap">
        <span class="time" id="cur">0:00</span>
        <div class="seek" id="seek"><div class="fill" id="fill"></div><div class="knob" id="knob"></div></div>
        <span class="time" id="dur">0:00</span>
      </div>
    </div>
  </div>

  <audio id="audio" preload="none"></audio>
  <script src="data.js"></script>
  <script>
  (function(){
    var DATA = window.MAYA_DATA || {clips:[],categories:[]};
    var CLIPS = DATA.clips || [];
    var CATS = DATA.categories || [];
    var catMap = {}; CATS.forEach(function(c){catMap[c.key]=c;});

    // ---- 闪耀星光 + 飘落花瓣 ----
    (function(){
      var box=document.getElementById('sparkles');
      if(box){
        var glyphs=['✦','✧','·','✵','⋆','❋'];
        var cols=['#fff6c9','#ffd9ea','#ffffff','#ffe6a8','#ffc6de'];
        for(var i=0;i<30;i++){
          var s=document.createElement('span'); s.className='sparkle';
          s.textContent=glyphs[i%glyphs.length];
          s.style.color=cols[i%cols.length];
          s.style.left=(Math.random()*100).toFixed(2)+'%';
          s.style.top=(Math.random()*94).toFixed(2)+'%';
          s.style.fontSize=(8+Math.random()*14).toFixed(0)+'px';
          s.style.animationDelay=(-Math.random()*3).toFixed(2)+'s';
          s.style.animationDuration=(2.2+Math.random()*2.6).toFixed(2)+'s';
          box.appendChild(s);
        }
      }
      var pbox=document.getElementById('petals');
      if(pbox){
        for(var j=0;j<16;j++){
          var p=document.createElement('span'); p.className='petal';
          var sz=(9+Math.random()*10).toFixed(0);
          p.style.left=(Math.random()*100).toFixed(2)+'%';
          p.style.width=sz+'px'; p.style.height=sz+'px';
          p.style.opacity=(0.5+Math.random()*0.4).toFixed(2);
          p.style.animation='fall '+(9+Math.random()*9).toFixed(1)+'s linear infinite';
          p.style.animationDelay=(-Math.random()*12).toFixed(1)+'s';
          pbox.appendChild(p);
        }
      }
    })();

    // ---- 状态 ----
    var audio=document.getElementById('audio');
    var state={filter:'all', q:'', shuffle:false, autonext:true, order:[], pos:-1};
    var view=[]; // 当前显示(过滤后)的 clips

    // ---- 头部计数 ----
    document.getElementById('count').textContent='✈ 共 '+CLIPS.length+' 条语音';

    // ---- 分类筛选条 ----
    var chips=document.getElementById('chips');
    function countCat(k){var n=0;for(var i=0;i<CLIPS.length;i++)if(CLIPS[i].cat===k)n++;return n;}
    function makeChip(key,label,color,n,on){
      var b=document.createElement('button'); b.className='chip'+(on?' on':''); b.dataset.key=key;
      if(on&&color) b.style.background=color;
      b.innerHTML=(color?'<span class="dot" style="background:'+color+'"></span>':'')+
        '<span>'+label+'</span><span class="n">'+n+'</span>';
      b.onclick=function(){ state.filter=key; renderChips(); render(); };
      return b;
    }
    function renderChips(){
      chips.innerHTML='';
      chips.appendChild(makeChip('all','全部','', CLIPS.length, state.filter==='all'));
      CATS.forEach(function(c){
        var n=countCat(c.key); if(!n) return;
        chips.appendChild(makeChip(c.key,c.label,c.color,n,state.filter===c.key));
      });
    }

    // ---- 渲染卡片 ----
    var grid=document.getElementById('grid'), empty=document.getElementById('empty');
    function matches(c){
      if(state.filter!=='all' && c.cat!==state.filter) return false;
      if(state.q){var q=state.q.toLowerCase();
        if((c.cn||'').toLowerCase().indexOf(q)<0 && (c.jp||'').toLowerCase().indexOf(q)<0) return false;}
      return true;
    }
    function render(){
      view=CLIPS.filter(matches);
      grid.innerHTML='';
      empty.style.display=view.length?'none':'block';
      var frag=document.createDocumentFragment();
      view.forEach(function(c){
        var cat=catMap[c.cat]||{label:'',color:'#7dd3fc'};
        var card=document.createElement('button');
        card.className='card'+(current&&current.id===c.id?' playing':'');
        card.style.setProperty('--cc',cat.color);
        card.dataset.id=c.id;
        card.innerHTML='<p class="cn">'+esc(c.cn)+'</p><p class="jp">'+esc(c.jp)+'</p>'+
          '<div class="meta"><span class="tag" style="background:'+cat.color+'">'+cat.label+'</span>'+
          '<span class="play">▶</span></div>';
        card.onclick=function(){ playClip(c, true); };
        frag.appendChild(card);
      });
      grid.appendChild(frag);
    }
    function esc(s){return (s||'').replace(/[&<>"]/g,function(m){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m];});}

    // ---- 播放逻辑 ----
    var current=null;
    function buildOrder(){
      state.order=view.length?view.map(function(c){return c.id;}):CLIPS.map(function(c){return c.id;});
      if(state.shuffle){
        for(var i=state.order.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));
          var t=state.order[i];state.order[i]=state.order[j];state.order[j]=t;}
      }
    }
    function clipById(id){for(var i=0;i<CLIPS.length;i++)if(CLIPS[i].id===id)return CLIPS[i];return null;}
    function playClip(c, rebuild){
      if(!c) return;
      current=c;
      if(rebuild||!state.order.length){ buildOrder(); }
      state.pos=state.order.indexOf(c.id);
      playFile(c.file);
      updateNP(); markPlaying();
      scrollToCurrent(rebuild ? 'nearest' : 'center'); // 手动点击就近,自动切歌居中
    }
    // 播放一个音频文件;若浏览器因 MIME 非标准而拒绝,则改用 blob(强制 audio/mpeg)兜底
    var _blobUrl=null;
    function playFile(file){
      if(_blobUrl){ try{ URL.revokeObjectURL(_blobUrl); }catch(_){} _blobUrl=null; }
      audio.src=file;
      var p=audio.play();
      if(p&&p.catch) p.catch(function(err){
        if(err&&err.name==='NotSupportedError'){ playViaBlob(file); }
        else showPlayErr(err);
      });
    }
    function playViaBlob(file){
      fetch(file).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.blob(); }).then(function(b){
        _blobUrl=URL.createObjectURL(new Blob([b],{type:'audio/mpeg'}));
        audio.src=_blobUrl;
        return audio.play();
      }).catch(showPlayErr);
    }
    function showPlayErr(err){
      var jp=document.getElementById('npJp');
      if(jp){ jp.textContent='⚠ 播放失败:'+((err&&err.name)||(err&&err.message)||'未知'); jp.classList.remove('empty-hint'); }
      try{ console.error('play error', err, 'audio.error=', audio.error); }catch(_){}
    }
    function scrollToCurrent(block){
      var el=grid.querySelector('.card.playing');
      if(!el) return;
      if(el.scrollIntoView) el.scrollIntoView({behavior:'smooth', block:block||'nearest'});
      el.classList.remove('locate'); void el.offsetWidth; el.classList.add('locate'); // 重新触发脉冲
      setTimeout(function(){ el.classList.remove('locate'); }, 800);
    }
    function step(d){
      if(!state.order.length) buildOrder();
      if(state.pos<0){ state.pos=0; } else { state.pos=(state.pos+d+state.order.length)%state.order.length; }
      playClip(clipById(state.order[state.pos]), false);
    }
    function updateNP(){
      var cat=current?(catMap[current.cat]||{}):{};
      document.getElementById('npCn').textContent=current?current.cn:'点一条语音开始播放 ✧';
      var jp=document.getElementById('npJp'); jp.textContent=current?current.jp:'摩耶,随时准备起飞!';
      jp.classList.toggle('empty-hint',!current);
    }
    function markPlaying(){
      var cards=grid.querySelectorAll('.card');
      cards.forEach(function(el){
        var on=current&&String(current.id)===el.dataset.id;
        el.classList.toggle('playing',on);
        var pb=el.querySelector('.play'); if(pb) pb.textContent=on?'❚❚':'▶';
      });
    }

    // ---- 控件 ----
    var pp=document.getElementById('playpause');
    pp.onclick=function(){ if(!current){ step(1); return; } if(audio.paused) audio.play(); else audio.pause(); };
    document.getElementById('prev').onclick=function(){ step(-1); };
    document.getElementById('next').onclick=function(){ step(1); };
    document.getElementById('shuffle').onclick=function(){ state.shuffle=!state.shuffle;
      this.classList.toggle('on',state.shuffle); buildOrder(); if(current)state.pos=state.order.indexOf(current.id); };
    var an=document.getElementById('autonext');
    an.onclick=function(){ state.autonext=!state.autonext; this.classList.toggle('on',state.autonext); };
    document.getElementById('shuffleAll').onclick=function(){
      state.shuffle=true; document.getElementById('shuffle').classList.add('on');
      buildOrder(); state.pos=-1; step(1);
    };

    audio.addEventListener('play',function(){ pp.textContent='❚❚'; markPlaying(); });
    audio.addEventListener('pause',function(){ pp.textContent='▶'; markPlaying(); });
    audio.addEventListener('ended',function(){ if(state.autonext) step(1); else { pp.textContent='▶'; } });
    audio.addEventListener('error',function(){ try{ console.error('media error code', audio.error&&audio.error.code); }catch(_){} });

    // ---- 进度条 ----
    var fill=document.getElementById('fill'), knob=document.getElementById('knob'),
        seek=document.getElementById('seek'), curT=document.getElementById('cur'), durT=document.getElementById('dur');
    function fmt(t){ if(!isFinite(t))return '0:00'; var m=Math.floor(t/60),s=Math.floor(t%60); return m+':'+(s<10?'0':'')+s; }
    audio.addEventListener('timeupdate',function(){
      var p=audio.duration?(audio.currentTime/audio.duration*100):0;
      fill.style.width=p+'%'; knob.style.left=p+'%'; curT.textContent=fmt(audio.currentTime);
    });
    audio.addEventListener('loadedmetadata',function(){ durT.textContent=fmt(audio.duration); });
    function seekTo(e){ var r=seek.getBoundingClientRect(); var x=((e.clientX||(e.touches&&e.touches[0].clientX))-r.left)/r.width;
      x=Math.max(0,Math.min(1,x)); if(audio.duration) audio.currentTime=x*audio.duration; }
    var dragging=false;
    seek.addEventListener('mousedown',function(e){dragging=true;seekTo(e);});
    window.addEventListener('mousemove',function(e){if(dragging)seekTo(e);});
    window.addEventListener('mouseup',function(){dragging=false;});
    seek.addEventListener('click',seekTo);

    // ---- 键盘 ----
    document.addEventListener('keydown',function(e){
      if(e.target.tagName==='INPUT') return;
      if(document.getElementById('lightbox').classList.contains('on')) return; // 灯箱打开时交给灯箱处理
      if(e.code==='Space'){e.preventDefault();pp.click();}
      else if(e.code==='ArrowRight'){step(1);}
      else if(e.code==='ArrowLeft'){step(-1);}
    });

    // ---- 搜索 ----
    var si=document.getElementById('search');
    si.addEventListener('input',function(){ state.q=this.value.trim(); render(); });

    // ---- 播放器:拖动 / 收起 / 位置记忆 ----
    var player=document.getElementById('player');
    var grip=document.getElementById('grip');
    var collapseBtn=document.getElementById('collapse');
    var drag={active:false,dx:0,dy:0,moved:false};

    function savePlayer(){
      try{
        var d={collapsed:player.classList.contains('collapsed'),free:player.classList.contains('free')};
        if(d.free){ d.left=parseFloat(player.style.left)||0; d.top=parseFloat(player.style.top)||0; }
        localStorage.setItem('maya_player',JSON.stringify(d));
      }catch(e){}
    }
    function clampPos(left,top){
      var r=player.getBoundingClientRect();
      var maxL=window.innerWidth-r.width-6, maxT=window.innerHeight-r.height-6;
      return { left:Math.max(6,Math.min(left,Math.max(6,maxL))),
               top:Math.max(6,Math.min(top,Math.max(6,maxT))) };
    }
    function setFree(left,top){
      player.classList.add('free');
      var c=clampPos(left,top);
      player.style.left=c.left+'px'; player.style.top=c.top+'px'; player.style.bottom='auto';
    }
    grip.addEventListener('pointerdown',function(e){
      e.preventDefault();
      var r=player.getBoundingClientRect();
      if(!player.classList.contains('free')){ // 首次拖动:把当前居中位置固定为 left/top
        player.classList.add('free');
        player.style.left=r.left+'px'; player.style.top=r.top+'px'; player.style.bottom='auto';
      }
      drag.active=true; drag.moved=false;
      drag.dx=e.clientX-r.left; drag.dy=e.clientY-r.top;
      player.classList.add('dragging');
      try{ grip.setPointerCapture(e.pointerId); }catch(_){}
    });
    grip.addEventListener('pointermove',function(e){
      if(!drag.active) return;
      drag.moved=true;
      setFree(e.clientX-drag.dx, e.clientY-drag.dy);
    });
    function endDrag(e){
      if(!drag.active) return;
      drag.active=false; player.classList.remove('dragging');
      try{ grip.releasePointerCapture(e.pointerId); }catch(_){}
      if(drag.moved) savePlayer();
    }
    grip.addEventListener('pointerup',endDrag);
    grip.addEventListener('pointercancel',endDrag);

    collapseBtn.addEventListener('click',function(){
      var col=player.classList.toggle('collapsed');
      collapseBtn.textContent=col?'▴':'▾';
      if(player.classList.contains('free')){ // 尺寸变了,重新夹到可视范围
        var r=player.getBoundingClientRect(); setFree(r.left,r.top);
      }
      savePlayer();
    });

    window.addEventListener('resize',function(){
      if(player.classList.contains('free')){ var r=player.getBoundingClientRect(); setFree(r.left,r.top); }
    });

    function restorePlayer(){
      try{
        var d=JSON.parse(localStorage.getItem('maya_player')||'null'); if(!d) return;
        if(d.collapsed){ player.classList.add('collapsed'); collapseBtn.textContent='▴'; }
        if(d.free && d.left!=null){ setFree(d.left,d.top); }
      }catch(e){}
    }

    // ---- 视图切换 + 动图画廊 ----
    var GALLERY=DATA.gallery||[];
    var voiceView=document.getElementById('voiceView');
    var controls=document.querySelector('.controls');
    var galleryView=document.getElementById('galleryView');
    var pager=document.getElementById('pager');
    var tabs=document.getElementById('tabs');
    var PAGE_SIZE=12;   // 每页展示数量
    var gpage=0;

    // 背景角色:点击背景任意位置生成(淡入 -> 移动 -> 淡出后自动消失),最多同时 3 个
    (function(){
      var box=document.getElementById('sprites');
      if(!box || !GALLERY.length) return;
      var active=[];
      function rand(a,b){ return a+Math.random()*(b-a); }
      function pick(im){
        var k=Math.floor(Math.random()*GALLERY.length), g=0;
        while(GALLERY.length>1 && k===im.__last && g++<8){ k=Math.floor(Math.random()*GALLERY.length); }
        im.__last=k;
        var item=GALLERY[k];
        im.fetchPriority='low';
        im.src=(item&&item.anim)||(item&&item.full)||(item&&item.thumb)||item;
      }
      function makeSprite(cx,cy){
        if(active.length>=3){ var old=active.shift(); old.remove(); }
        var sp=document.createElement('div'); sp.className='sprite';
        sp.appendChild(document.createElement('img'));
        box.appendChild(sp);
        var sz=Math.round(rand(72,130)); sp.style.width=sz+'px'; sp.style.height=sz+'px';
        var x=Math.round(cx-sz/2); x=Math.max(4,Math.min(window.innerWidth-sz-4,x));
        var y=Math.round(cy-sz/2); y=Math.max(4,Math.min(window.innerHeight-sz-4,y));
        sp.style.left=x+'px'; sp.style.top=y+'px';
        var im=sp.firstChild; pick(im);
        var lifeMs=rand(5000,8000), lifeSec=lifeMs/1000;
        var dx=rand(-50,50), dy=rand(-40,40);
        sp.style.transition='none'; sp.style.opacity='0'; sp.style.transform='translate(0,0)';
        void sp.offsetWidth;
        sp.style.transition='opacity .9s ease, transform '+lifeSec.toFixed(1)+'s ease-in-out';
        requestAnimationFrame(function(){ sp.style.opacity='1'; sp.style.transform='translate('+dx.toFixed(0)+'px,'+dy.toFixed(0)+'px)'; });
        setTimeout(function(){ sp.style.opacity='0'; }, Math.max(2600, lifeMs-900));
        var cleanup=function(){
          sp.remove(); var i=active.indexOf(sp); if(i>=0) active.splice(i,1);
          if(active.length<3) makeSprite(rand(80, window.innerWidth-80), rand(60, window.innerHeight-100));
        };
        setTimeout(cleanup, lifeMs+1200);
        active.push(sp);
      }
      // 自动化:保持背景始终有 3 个
      function autoFill(){ while(active.length<3){ makeSprite(rand(80, window.innerWidth-80), rand(60, window.innerHeight-100)); } }
      autoFill();
      document.addEventListener('click',function(e){
        var t=e.target;
        if(t.closest('button')||t.closest('[role="button"]')||t.closest('.player')||t.closest('.controls')||t.closest('.lightbox')) return;
        makeSprite(e.clientX, e.clientY);
      });
    })();

    // 视口内才加载压缩动图(播放),离开视野换回静态缩略图(省资源)
    var galIO = ('IntersectionObserver' in window) ? new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        var card=e.target, img=card.__img; if(!img) return;
        var anim=card.getAttribute('data-anim'), thumb=card.getAttribute('data-thumb');
        if(e.isIntersecting){ if(img.getAttribute('src')!==anim) img.src=anim; }
        else { if(img.getAttribute('src')!==thumb) img.src=thumb; }
      });
    }, { rootMargin:'120px 0px' }) : null;

    function renderGalleryPage(p){
      var pages=Math.max(1,Math.ceil(GALLERY.length/PAGE_SIZE));
      gpage=Math.max(0,Math.min(p,pages-1));
      if(galIO) galIO.disconnect();
      galleryView.innerHTML='';
      var start=gpage*PAGE_SIZE, end=Math.min(start+PAGE_SIZE,GALLERY.length);
      var frag=document.createDocumentFragment();
      for(var i=start;i<end;i++){
        (function(gi){
          var item=GALLERY[gi];
          var thumb=(item&&item.thumb)||(item&&item.full)||item;
          var anim=(item&&item.anim)||(item&&item.full)||thumb;
          var card=document.createElement('div'); card.className='gcard';
          card.setAttribute('data-anim',anim); card.setAttribute('data-thumb',thumb);
          var img=document.createElement('img');
          img.loading='lazy'; img.decoding='async'; img.fetchPriority='low'; img.src=thumb; img.alt='动图 '+(gi+1);
          card.__img=img; card.appendChild(img);
          card.onclick=function(){ openLb(gi); };
          frag.appendChild(card);
        })(i);
      }
      galleryView.appendChild(frag);
      if(galIO) Array.prototype.forEach.call(galleryView.children,function(c){ galIO.observe(c); });
      renderPager(pages);
    }

    function renderPager(pages){
      pager.innerHTML='';
      if(pages<=1) return;
      function mk(txt,pg,cls,dis){ var b=document.createElement('button'); b.className='pgbtn'+(cls||'');
        b.textContent=txt;
        if(dis){ b.disabled=true; }
        else { b.onclick=function(){ renderGalleryPage(pg); window.scrollTo({top:0,behavior:'smooth'}); }; }
        return b; }
      pager.appendChild(mk('‹',gpage-1,'',gpage===0));
      var nums=[];
      if(pages<=9){ for(var i=0;i<pages;i++) nums.push(i); }
      else {
        nums.push(0);
        var s=Math.max(1,gpage-1), e=Math.min(pages-2,gpage+1);
        if(s>1) nums.push('.');
        for(var j=s;j<=e;j++) nums.push(j);
        if(e<pages-2) nums.push('.');
        nums.push(pages-1);
      }
      nums.forEach(function(n){
        if(n==='.'){ var d=document.createElement('button'); d.className='pgbtn dots'; d.textContent='…'; d.disabled=true; pager.appendChild(d); }
        else pager.appendChild(mk(String(n+1),n,n===gpage?' on':''));
      });
      pager.appendChild(mk('›',gpage+1,'',gpage===pages-1));
    }
    function switchView(v){
      var g=(v==='gallery');
      Array.prototype.forEach.call(tabs.children,function(b){ b.classList.toggle('on',b.dataset.view===v); });
      voiceView.style.display=g?'none':'';
      controls.style.display=g?'none':'';
      galleryView.style.display=g?'':'none';
      pager.style.display=g?'':'none';
      if(g) renderGalleryPage(gpage);
      window.scrollTo({top:0,behavior:'smooth'});
    }
    Array.prototype.forEach.call(tabs.children,function(b){ b.onclick=function(){ switchView(b.dataset.view); }; });

    // ---- 灯箱 ----
    var lb=document.getElementById('lightbox'), lbImg=document.getElementById('lbImg'),
        lbCount=document.getElementById('lbCount'), lbIdx=0;
    function openLb(i){ lbIdx=i; var item=GALLERY[i]; var full=(item&&item.full)||(item&&item.thumb)||item;
      lbImg.src=full; lbCount.textContent=(i+1)+' / '+GALLERY.length; lb.classList.add('on'); }
    function closeLb(){ lb.classList.remove('on'); lbImg.src=''; }
    function lbStep(d){ lbIdx=(lbIdx+d+GALLERY.length)%GALLERY.length; openLb(lbIdx); }
    document.getElementById('lbClose').onclick=closeLb;
    document.getElementById('lbPrev').onclick=function(e){ e.stopPropagation(); lbStep(-1); };
    document.getElementById('lbNext').onclick=function(e){ e.stopPropagation(); lbStep(1); };
    lb.onclick=function(e){ if(e.target===lb) closeLb(); };
    document.addEventListener('keydown',function(e){
      if(!lb.classList.contains('on')) return;
      if(e.key==='Escape') closeLb();
      else if(e.key==='ArrowRight') lbStep(1);
      else if(e.key==='ArrowLeft') lbStep(-1);
    });

    // ---- 初始化 ----
    (function(){
      var galTab=tabs.querySelector('[data-view="gallery"]');
      if(GALLERY.length){ galTab.textContent='🖼 动图 '+GALLERY.length; }
      else { galTab.style.display='none'; }
    })();
    renderChips(); render(); restorePlayer();
  })();
  </script>
</body>
</html>
